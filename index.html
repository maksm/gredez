<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0d6efd" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="description" content="Meteorološki podatki za Ljubljano iz različnih virov">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="GreDež">
    <meta name="msapplication-TileColor" content="#0d6efd">
    <meta name="msapplication-tap-highlight" content="no">
    
    <title>GreDež - Vreme Slovenija</title>
    
    <link rel="canonical" href="https://maksm.github.io/gredez/">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="images/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="images/icons/icon-512.png">
    <link rel="apple-touch-icon" href="images/icons/icon-192.png">
    <link rel="apple-touch-startup-image" href="images/icons/icon-512.png">
    <link rel="mask-icon" href="images/icons/icon-512.png" color="#0d6efd">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          crossorigin="anonymous"
          fetchpriority="high">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="header"></div>
    
    <div class="pull-indicator">Potegni navzdol za osvežitev</div>

    <div class="container" id="main_container">
        <div class="row mt-3">
            <div class="col-11">
                <h3 id="page-title"></h3>
            </div>
            <div class="col-1 text-end">
                <a id="source-link" href="" target="_blank" rel="noopener">Vir</a>
            </div>
        </div>

        <div id="images-container">
            <!-- Images will be dynamically inserted here -->
        </div>

        <div id="links-container" class="row mt-3">
            <!-- Links will be dynamically inserted here if present -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            crossorigin="anonymous"
            defer></script>
    <script src="js/app.js" type="module"></script>

    <script>
        // Check if the app is in standalone mode (installed PWA)
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            document.documentElement.setAttribute('data-pwa', 'true');
        }
    </script>
</body>
</html>
