<header class="bg-light border-bottom">
    <nav class="navbar navbar-expand p-0">
        <div class="container">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Trenutno</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="radar.html">Radar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="aladin.html">Aladin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="epsgram.html">EPSgram</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="blitz.html">Blitz</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="gefs.html">GEFS</a>
                </li>
            </ul>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="theme-icon"></span>
            </button>
        </div>
    </nav>

    <style>
        .theme-toggle {
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            transition: transform 0.2s ease;
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-icon {
            font-size: 1.25rem;
        }
        
        /* Show moon icon in light mode (to switch to dark) */
        .theme-icon::before {
            content: "🌙";
        }
        
        /* Show sun icon in dark mode (to switch to light) */
        [data-theme="dark"] .theme-icon::before {
            content: "☀️";
        }
    </style>

<script>
        // Clean up any existing event listeners
        const existingScript = document.querySelector('script[data-nav-script]');
        if (existingScript) {
            existingScript.remove();
        }

        // Create and add new script with nav highlighting
        const script = document.createElement('script');
        script.setAttribute('data-nav-script', '');
        script.textContent = `
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPage) {
                    link.classList.add('active');
                    link.setAttribute('aria-current', 'page');
                }
            });
        `;
        document.head.appendChild(script);
    </script>

    <style>
        .nav-link {
            color: var(--text-color);
            padding: 0.5rem 1rem;
            transition: color 0.2s ease;
        }
        
        .nav-link:hover {
            color: var(--primary-color);
        }
        
        .nav-link.active {
            color: var(--primary-color);
            font-weight: 600;
        }

        @media (max-width: 576px) {
            .navbar-nav {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                width: 100%;
            }
            
            .nav-item {
                flex: 0 0 auto;
            }
            
            .nav-link {
                white-space: nowrap;
                padding: 0.5rem;
            }
        }
    </style>
</header>
